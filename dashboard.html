<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        .active {
            background-color: #4A00FF;
            color: white;
            font-weight: semibold;
            border: none;
        }

        .inactive {
            background-color: white;
            color: #64748B;
            border: 1px solid #E4E4E7;
            font-weight: medium;
        }

        .active:hover {
            background-color: #3e00dc;
        }

        .inactive:hover {
            background-color: #eeeeee;
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar bg-white border-b border-[#E9E9E9] shadow-sm px-3 sm:px-4">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                    <img class="w-9" src="./assets/github-logo.png" alt="Github Logo">
                    <p class="font-semibold text-2xl text-[#1F2937] mt-1 sm:block hidden">GitHub Issues Tracker</p>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <label class="input input-sm sm:input-md sm:w-auto w-32">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" placeholder="Search issues..." />
                </label>
                <button type="button" class="btn btn-sm sm:btn-md btn-primary shadow-none border-none bg-[#4A00FF]">
                    Search
                </button>
            </div>
        </div>
    </header>

    <section class="bg-[#F8FAFC] min-h-screen">
        <div class="container mx-auto sm:py-14 py-7 pb-0 space-y-4">
            <div class="card w-full bg-base-100 shadow-sm">
                <div class="flex flex-row flex-wrap gap-2 sm:p-6 p-4">
                    <button id="tab-all" onclick="tabToggle('tab-all')"
                        class="btn btn-primary w-[120px] active shadow-none rounded-sm">All</button>
                    <button id="tab-open" onclick="tabToggle('tab-open')"
                        class="btn btn-outline w-[120px] inactive shadow-none rounded-sm">Open</button>
                    <button id="tab-closed" onclick="tabToggle('tab-closed')"
                        class="btn btn-outline w-[120px] inactive shadow-none rounded-sm">Closed</button>
                </div>
            </div>

            <div class="card w-full bg-base-100 shadow-sm overflow-hidden">
                <div
                    class="flex sm:flex-row flex-col flex-wrap sm:gap-2 gap-3 sm:p-6 p-4 justify-between sm:items-center items-start border-b border-[#E4E4E7]">
                    <div class="flex items-center gap-2">
                        <div class="p-3 bg-[#ECE4FF] rounded-full flex justify-center items-center">
                            <img class="w-8" src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h5 id="total-issue-count" class="font-semibold sm:text-xl text-lg">0 Issues</h5>
                            <p class="text-[#64748B] font-normal sm:text-base text-sm">Track and manage your project
                                issues</p>
                        </div>
                    </div>
                    <div class="flex justify-center items-center gap-4">
                        <div class="font-base text-[#1F2937] flex justify-center items-center gap-1">
                            <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div><span>Open</span>
                        </div>
                        <div class="font-base text-[#1F2937] flex justify-center items-center gap-1">
                            <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                            Closed
                        </div>
                    </div>
                </div>

                <div id="issue-container"
                    class="bg-[#FBFBFB] sm:p-6 p-4 grid xl:grid-cols-4 md:grid-cols-3 sm:grid-cols-2 grid-cols-1 gap-3">
                </div>
            </div>
        </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_1" class="modal">
        <div class="modal-box">
            <p class="text-[#64748B] text-xs mb-1">Popup</p>
            <h3 id="modal-title" class="text-lg font-bold"></h3>
            <div class="flex items-center gap-2 mt-2 flex-wrap">
                <div id="modal-status-badge"></div>
                <span class="text-[#64748B] text-sm">&bull;</span>
                <p id="modal-meta" class="text-[#64748B] text-sm"></p>
                <span class="text-[#64748B] text-sm">&bull;</span>
                <p id="modal-date" class="text-[#64748B] text-sm"></p>
            </div>
            <div id="modal-labels" class="flex flex-wrap gap-1 mt-3"></div>
            <p id="modal-description" class="py-4 text-[#64748B]"></p>
            <div class="border-t border-[#E4E4E7] pt-4 flex items-center gap-8">
                <div class="flex-1">
                    <p class="text-[#64748B] text-xs">Assignee:</p>
                    <p id="modal-assignee" class="font-semibold text-sm"></p>
                </div>
                <div class="flex-1">
                    <p class="text-[#64748B] text-xs">Priority:</p>
                    <div id="modal-priority" class="mt-1"></div>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary bg-[#4A00FF] border-none shadow-none">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./scripts/dashboard.js"></script>
</body>

</html>
